<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardtekk Bunker | Admin Zentrale</title>
    <style>
        :root {
            --bg-main: #050505;
            --bg-card: #111111;
            --neon-pink: #ff0055;
            --neon-blue: #00e5ff;
            --neon-purple: #b000ff;
            --text-light: #ffffff;
            --text-dim: #888888;
            
            /* Ränge Farben */
            --color-owner: #ffd700; 
            --color-admin: #ff3333; 
            --color-mod: #3399ff;   
            --color-id: #cc33ff;    
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- LOGIN POP-UP (MODAL) --- */
        #login-modal {
            display: none; /* Standardmäßig versteckt */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* Dunkler Hintergrund */
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.2);
            width: 100%;
            max-width: 350px;
            text-align: center;
            position: relative;
            animation: popIn 0.3s ease-out;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover { color: white; }

        .login-box h1 {
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }
        .input-field {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background-color: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border 0.3s;
        }
        .input-field:focus { border-color: var(--neon-pink); outline: none; }
        
        .btn-main {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--neon-pink), #cc0044);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4); }
        #login-error { color: #ff3333; margin-top: 15px; font-weight: bold; min-height: 20px;}

        /* --- HAUPT APP --- */
        #app-screen {
            display: block; /* Jetzt für alle sichtbar */
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-card);
            padding: 15px 30px;
            border-radius: 12px;
            border-bottom: 2px solid var(--neon-pink);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 22px;
            font-weight: 900;
            color: var(--neon-pink);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }
        .nav-tabs button {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 15px;
            font-weight: bold;
            margin-left: 15px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .nav-tabs button:hover, .nav-tabs button.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.05);
        }
        .user-badge {
            background: #222;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page { display: none; }
        .page.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid #222;
            margin-bottom: 20px;
        }
        h2 { margin-top: 0; color: white; display: flex; align-items: center; gap: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { color: var(--text-dim); text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        tr:hover { background-color: #1a1a1a; }
        .id-badge { background: #000; padding: 4px 8px; border-radius: 4px; font-family: monospace; color: var(--neon-blue); border: 1px solid #333;}
        
        .btn-small { background: #333; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: background 0.2s;}
        .btn-small:hover { background: #444; }
        .btn-small.danger:hover { background: var(--color-admin); }

        .role-owner { color: var(--color-owner); font-weight: bold; }
        .role-admin { color: var(--color-admin); font-weight: bold; }
        .role-mod { color: var(--color-mod); font-weight: bold; }
        .role-id { color: var(--color-id); font-weight: bold; }
    </style>
</head>
<body>

    <!-- ================= LOGIN MODAL (POP-UP) ================= -->
    <div id="login-modal">
        <div class="login-box">
            <span class="close-btn" onclick="closeLoginModal()">&times;</span>
            <h1>Team Login</h1>
            <input type="text" id="login-username" class="input-field" placeholder="Benutzername">
            <input type="password" id="login-password" class="input-field" placeholder="Passwort">
            <button class="btn-main" onclick="versucheLogin()">Einloggen</button>
            <div id="login-error"></div>
        </div>
    </div>

    <!-- ================= HAUPT APP (SICHTBAR) ================= -->
    <div id="app-screen">
        <nav>
            <div class="logo">Hardtekk Bunker</div>
            <div class="nav-tabs">
                <button id="tab-home" class="active" onclick="switchTab('home')">Playlist</button>
                <!-- Versteckt für normale Besucher -->
                <button id="tab-upload" onclick="switchTab('upload')" style="display: none;">Track Upload</button>
                <button id="tab-team" onclick="switchTab('team')" style="display: none; color: var(--neon-purple);">Team Verwaltung</button>
            </div>
            <!-- Hier steht der Login-Button für Gäste -->
            <div class="user-badge" id="display-user">
                <button class="btn-small" style="background: var(--neon-pink); font-weight: bold; padding: 6px 16px;" onclick="openLoginModal()">Team Login</button>
            </div>
        </nav>

        <!-- SEITE 1: PLAYLIST (Für alle sichtbar) -->
        <div id="page-home" class="page active card">
            <h2>🎵 Bunker Datenbank</h2>
            <table id="playlist-table">
                <thead><tr><th>Hochgeladen von</th><th>Künstler</th><th>Titel</th><th>Roblox ID</th></tr></thead>
                <tbody id="playlist-body"></tbody>
            </table>
        </div>

        <!-- SEITE 2: UPLOAD (Nur Team) -->
        <div id="page-upload" class="page card">
            <h2>⚡ Neuen Track einspeisen</h2>
            <input type="text" id="up-artist" class="input-field" placeholder="Künstler / DJ">
            <input type="text" id="up-title" class="input-field" placeholder="Songtitel">
            <input type="text" id="up-id" class="input-field" placeholder="Roblox Audio ID">
            <button class="btn-main" onclick="uploadTrack()">Track Hochladen</button>
            <div id="upload-status" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>
        </div>

        <!-- SEITE 3: TEAM VERWALTUNG (Nur Owner/Admin) -->
        <div id="page-team" class="page card">
            <h2>👑 Team & Rollen Verwaltung</h2>
            <div style="background: #000; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #333;">
                <h3 style="margin-top: 0; color: var(--neon-blue);">Neuen Zugang erstellen</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="new-user-name" class="input-field" placeholder="Name" style="margin:0;">
                    <input type="text" id="new-user-pass" class="input-field" placeholder="Passwort" style="margin:0;">
                    <select id="new-user-role" class="input-field" style="margin:0;">
                        <option value="Admin">⚡ Admin</option>
                        <option value="Moderator">🛡️ Moderator</option>
                        <option value="IDs-Manager">🎵 IDs-Manager</option>
                    </select>
                    <button class="btn-main" style="width: auto; padding: 0 20px;" onclick="createNewUser()">Erstellen</button>
                </div>
                <div id="team-status" style="margin-top: 10px; color: #00ff66; font-weight: bold;"></div>
            </div>
            <table>
                <thead><tr><th>Benutzername</th><th>Rang</th><th>Aktion</th></tr></thead>
                <tbody id="team-body"></tbody>
            </table>
        </div>
    </div>

    <!-- ================= JAVASCRIPT ================= -->
    <script>
        const SUPABASE_URL = "https://xyzbjnxrhzdcxuuwfvuq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Kp5QnlVPRhgGm221Iz1b6Q_wHcdXmKH";
        let currentUser = null;

        // Wenn die Seite lädt, zeige allen Gästen direkt die Playlist an!
        window.onload = () => { ladePlaylist(); };

        // Modal Steuerung
        function openLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
        function closeLoginModal() { document.getElementById('login-modal').style.display = 'none'; }

        function formatRole(role) {
            if (role === 'Owner') return '<span class="role-owner">👑 Owner</span>';
            if (role === 'Admin') return '<span class="role-admin">⚡ Admin</span>';
            if (role === 'Moderator') return '<span class="role-mod">🛡️ Moderator</span>';
            if (role === 'IDs-Manager') return '<span class="role-id">🎵 IDs-Manager</span>';
            return role;
        }

        async function versucheLogin() {
            const userIn = document.getElementById('login-username').value.trim();
            const passIn = document.getElementById('login-password').value.trim();
            const errorDiv = document.getElementById('login-error');

            if (!userIn || !passIn) return errorDiv.innerText = "Bitte Daten eingeben!";
            errorDiv.innerText = "Lade...";
            errorDiv.style.color = "white";

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/team_users?username=eq.${userIn}&select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                
                if (!res.ok) throw new Error("Netzwerkfehler");
                const data = await res.json();

                if (data.length === 0 || data[0].password !== passIn) {
                    errorDiv.style.color = "#ff3333";
                    errorDiv.innerText = "Falscher Name oder Passwort!";
                } else {
                    // LOGIN ERFOLGREICH
                    currentUser = data[0];
                    closeLoginModal(); // Pop-up schließen
                    
                    // Oben rechts Name und Logout-Button anzeigen
                    document.getElementById('display-user').innerHTML = `
                        ${formatRole(currentUser.role)} | <b>${currentUser.username}</b> 
                        <button class="btn-small danger" style="margin-left:10px;" onclick="logout()">Logout</button>
                    `;
                    
                    // Geheime Tabs einblenden
                    document.getElementById('tab-upload').style.display = 'inline-block';
                    if (currentUser.role === 'Owner' || currentUser.role === 'Admin') {
                        document.getElementById('tab-team').style.display = 'inline-block';
                        ladeTeam();
                    }
                    
                    // Felder im Login leeren für Sicherheit
                    document.getElementById('login-username').value = '';
                    document.getElementById('login-password').value = '';
                    errorDiv.innerText = '';
                }
            } catch (err) {
                errorDiv.style.color = "#ff3333";
                errorDiv.innerText = "Verbindungsfehler zur Datenbank.";
            }
        }

        function logout() {
            currentUser = null;
            // Alles wieder auf Gast-Modus setzen
            document.getElementById('display-user').innerHTML = `<button class="btn-small" style="background: var(--neon-pink); font-weight: bold; padding: 6px 16px;" onclick="openLoginModal()">Team Login</button>`;
            document.getElementById('tab-upload').style.display = 'none';
            document.getElementById('tab-team').style.display = 'none';
            switchTab('home'); // Zurück zur Startseite werfen
        }

        function switchTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
            if (tabId === 'home') ladePlaylist();
            if (tabId === 'team') ladeTeam();
        }

        async function ladePlaylist() {
            const tbody = document.getElementById('playlist-body');
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/playlist?order=id.desc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const data = await res.json();
                tbody.innerHTML = '';
                data.forEach(song => {
                    tbody.innerHTML += `<tr><td style="color:#aaa;">${song.role || 'Unbekannt'}</td><td style="font-weight:bold; color:white;">${song.artist}</td><td>${song.title}</td><td><span class="id-badge">${song.audio_id}</span></td></tr>`;
                });
            } catch (e) { tbody.innerHTML = '<tr><td colspan="4">Fehler beim Laden.</td></tr>'; }
        }

        async function uploadTrack() {
            if (!currentUser) return; // Nur zur Sicherheit, falls ein Gast es versucht
            const artist = document.getElementById('up-artist').value;
            const title = document.getElementById('up-title').value;
            const audioId = document.getElementById('up-id').value;
            const statusDiv = document.getElementById('upload-status');
            if (!artist || !title || !audioId) { statusDiv.style.color = "#ff3333"; statusDiv.innerText = "Alle Felder ausfüllen!"; return; }

            statusDiv.style.color = "white"; statusDiv.innerText = "Lädt hoch...";
            const uploaderInfo = `${currentUser.username} (${currentUser.role})`;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/playlist`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ role: uploaderInfo, artist: artist, title: title, audio_id: audioId })
                });
                if (res.ok) {
                    statusDiv.style.color = "#00ff66"; statusDiv.innerText = "Track live!";
                    document.getElementById('up-artist').value = ''; document.getElementById('up-title').value = ''; document.getElementById('up-id').value = '';
                }
            } catch (e) { statusDiv.style.color = "#ff3333"; statusDiv.innerText = "Fehler beim Upload."; }
        }

        async function ladeTeam() {
            const tbody = document.getElementById('team-body');
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/team_users?order=role.asc`, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const data = await res.json();
                tbody.innerHTML = '';
                data.forEach(user => {
                    let actionBtn = user.role !== 'Owner' ? `<button class="btn-small danger" onclick="deleteUser(${user.id}, '${user.username}')">Löschen</button>` : '';
                    tbody.innerHTML += `<tr><td style="font-weight:bold; color:white;">${user.username}</td><td>${formatRole(user.role)}</td><td>${actionBtn}</td></tr>`;
                });
            } catch (e) {}
        }

        async function createNewUser() {
            const name = document.getElementById('new-user-name').value;
            const pass = document.getElementById('new-user-pass').value;
            const role = document.getElementById('new-user-role').value;
            if (!name || !pass) return;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/team_users`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ username: name, password: pass, role: role })
                });
                document.getElementById('new-user-name').value = ''; document.getElementById('new-user-pass').value = ''; ladeTeam();
            } catch (e) {}
        }

        async function deleteUser(id, name) {
            if (!confirm(`Account '${name}' löschen?`)) return;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/team_users?id=eq.${id}`, { method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                ladeTeam();
            } catch (e) {}
        }
    </script>
</body>
</html>
